name: Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Evaluate deployment gate
        id: gate
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping production deploy: missing one or more Vercel secrets." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! npm_config_yes=true npx vercel@latest whoami --token="$VERCEL_TOKEN" >/tmp/vercel-auth.log 2>&1; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Skipping production deploy: VERCEL_TOKEN is present but invalid." >> "$GITHUB_STEP_SUMMARY"
            tail -n 20 /tmp/vercel-auth.log >> "$GITHUB_STEP_SUMMARY" || true
            exit 0
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        if: steps.gate.outputs.deploy == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.gate.outputs.deploy == 'true'
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: steps.gate.outputs.deploy == 'true'
        run: pnpm typecheck

      - name: Run tests
        if: steps.gate.outputs.deploy == 'true'
        run: pnpm test

      - name: Install Vercel CLI
        if: steps.gate.outputs.deploy == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: steps.gate.outputs.deploy == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        if: steps.gate.outputs.deploy == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.gate.outputs.deploy == 'true'
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" | tr -d '\r' | tail -n 1)
          echo "production_url=$url" >> "$GITHUB_OUTPUT"
          echo "Production deployment: $url" >> "$GITHUB_STEP_SUMMARY"
